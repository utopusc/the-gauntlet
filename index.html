<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>THE GAUNTLET — Survive the VC boss battle</title>
    <meta
      name="description"
      content="Survive a boss-battle of AI VCs and earn your term sheet — a Gemini-powered fundraising flight simulator."
    />

    <!-- Tailwind via CDN (no config / no postcss) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts: Press Start 2P (pixel headings/HP) + VT323 (retro readable body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap"
      rel="stylesheet"
    />

    <!-- Pixel-retro Tailwind theme: arcade palette on near-black + pixel/retro fonts -->
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              // near-black indigo arcade backdrop
              bg: '#0a0612',
              bgPanel: '#120a22',
              // neon arcade palette
              neonCyan: '#22f0ff',
              neonMagenta: '#ff36d8',
              neonAmber: '#ffb627',
              neonGreen: '#39ff8b',
              neonRed: '#ff2e4c',
              neonViolet: '#b15bff',
              neonInk: '#e9e3ff',
            },
            fontFamily: {
              pixel: ['"Press Start 2P"', 'monospace'],
              retro: ['VT323', 'ui-monospace', 'monospace'],
            },
            boxShadow: {
              hard: '4px 4px 0 0 rgba(0,0,0,0.9)',
              'hard-sm': '2px 2px 0 0 rgba(0,0,0,0.9)',
            },
          },
        },
      };
    </script>

    <!-- Base reset only — all reusable arcade classes live in index.css -->
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body,
      #root {
        height: 100%;
      }
    </style>
  </head>
  <body>
    <!-- CRT overlay is mounted by App.tsx via the reusable .crt class (see index.css). -->
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>

<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>THE GAUNTLET — Survive the VC boss battle</title>
    <meta
      name="description"
      content="Survive a boss-battle of AI VCs and earn your term sheet — a Gemini-powered fundraising flight simulator."
    />

    <!-- Tailwind via CDN (no config / no postcss) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts: Space Grotesk (display) + Inter (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body,
      #root {
        height: 100%;
      }
      body {
        margin: 0;
        background: #05060a;
        color: #e7e9f3;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        overflow-x: hidden;
      }
      .font-display {
        font-family: 'Space Grotesk', 'Inter', sans-serif;
      }

      /* Animated neon/glass backdrop */
      .gauntlet-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background:
          radial-gradient(60% 50% at 15% 10%, rgba(34, 211, 238, 0.16), transparent 70%),
          radial-gradient(55% 45% at 85% 15%, rgba(139, 92, 246, 0.18), transparent 70%),
          radial-gradient(60% 60% at 50% 100%, rgba(245, 158, 11, 0.12), transparent 70%),
          #05060a;
      }
      .gauntlet-grid {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
        background-size: 48px 48px;
        mask-image: radial-gradient(ellipse 80% 70% at 50% 40%, black 40%, transparent 100%);
        -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 40%, black 40%, transparent 100%);
      }

      /* Reusable glass + glow helpers */
      .glass {
        background: rgba(16, 18, 27, 0.6);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .glow-cyan {
        box-shadow: 0 0 0 1px rgba(34, 211, 238, 0.35), 0 0 40px -8px rgba(34, 211, 238, 0.55);
      }
      .glow-violet {
        box-shadow: 0 0 0 1px rgba(139, 92, 246, 0.35), 0 0 40px -8px rgba(139, 92, 246, 0.55);
      }
      .glow-amber {
        box-shadow: 0 0 0 1px rgba(245, 158, 11, 0.35), 0 0 40px -8px rgba(245, 158, 11, 0.55);
      }
      .text-glow {
        text-shadow: 0 0 24px rgba(34, 211, 238, 0.35);
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.12);
        border-radius: 999px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
